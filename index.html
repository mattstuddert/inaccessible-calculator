<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="calc-title">calc</h1>
      <div class="theme-switcher">
        <fieldset class="theme-toggle">
          <legend class="theme-label sr-only">Theme</legend>
          <div class="theme-options">
            <div class="theme-option">
              <input type="radio" id="theme1" name="theme" value="1" checked>
              <label for="theme1" class="theme-btn">
                <span class="theme-number">1</span>
              </label>
            </div>
            <div class="theme-option">
              <input type="radio" id="theme2" name="theme" value="2">
              <label for="theme2" class="theme-btn">
                <span class="theme-number">2</span>
              </label>
            </div>
            <div class="theme-option">
              <input type="radio" id="theme3" name="theme" value="3">
              <label for="theme3" class="theme-btn">
                <span class="theme-number">3</span>
              </label>
            </div>
          </div>
        </fieldset>
      </div>
    </div>
    
    <div class="screen" id="screen">0</div>
    
    <div class="keypad">
      <div class="key number" onclick="inputNumber('7')">7</div>
      <div class="key number" onclick="inputNumber('8')">8</div>
      <div class="key number" onclick="inputNumber('9')">9</div>
      <div class="key function" onclick="deleteChar()">DEL</div>
      
      <div class="key number" onclick="inputNumber('4')">4</div>
      <div class="key number" onclick="inputNumber('5')">5</div>
      <div class="key number" onclick="inputNumber('6')">6</div>
      <div class="key operator" onclick="inputOperator('+')">+</div>
      
      <div class="key number" onclick="inputNumber('1')">1</div>
      <div class="key number" onclick="inputNumber('2')">2</div>
      <div class="key number" onclick="inputNumber('3')">3</div>
      <div class="key operator" onclick="inputOperator('-')">-</div>
      
      <div class="key operator" onclick="inputNumber('.')">.</div>
      <div class="key number" onclick="inputNumber('0')">0</div>
      <div class="key operator" onclick="inputOperator('/')">/</div>
      <div class="key operator" onclick="inputOperator('*')">x</div>
      
      <div class="key function reset" onclick="reset()">RESET</div>
      <div class="key equals" onclick="calculate()">=</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
